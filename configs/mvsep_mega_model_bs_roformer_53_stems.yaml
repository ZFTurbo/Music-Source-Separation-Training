audio:
  chunk_size: 441000
  dim_f: 1024
  dim_t: 801 # don't work (use in model)
  hop_length: 441 # don't work (use in model)
  n_fft: 2048
  num_channels: 2
  sample_rate: 44100
  min_mean_abs: 0.000     

model:
  dim: 256
  depth: 12 
  stereo: true
  num_stems: 53
  time_transformer_depth: 1
  freq_transformer_depth: 1 
  linear_transformer_depth: 0
  freqs_per_bands: !!python/tuple
    - 2
    - 2
    - 2
    - 2
    - 2
    - 2
    - 2
    - 2
    - 2
    - 2
    - 2
    - 2
    - 2
    - 2
    - 2
    - 2
    - 2
    - 2
    - 2
    - 2
    - 2
    - 2
    - 2
    - 2
    - 4
    - 4
    - 4
    - 4
    - 4
    - 4
    - 4
    - 4
    - 4
    - 4
    - 4
    - 4
    - 12
    - 12
    - 12
    - 12
    - 12
    - 12
    - 12
    - 12
    - 24
    - 24
    - 24
    - 24
    - 24
    - 24
    - 24
    - 24
    - 48
    - 48
    - 48
    - 48
    - 48
    - 48
    - 48
    - 48
    - 128
    - 129
  dim_head: 64
  heads: 8
  attn_dropout: 0.0
  ff_dropout: 0.0
  flash_attn: true
  dim_freqs_in: 1025
  stft_n_fft: 2048
  stft_hop_length: 512
  stft_win_length: 2048
  stft_normalized: false
  mask_estimator_depth: 2
  multi_stft_resolution_loss_weight: 1.0
  multi_stft_resolutions_window_sizes: !!python/tuple
  - 4096
  - 2048
  - 1024
  - 512
  - 256
  multi_stft_hop_size: 147
  multi_stft_normalized: False
  mlp_expansion_factor: 2
  use_torch_checkpoint: False # it allows to greatly reduce GPU memory consumption during training (not fully tested)
  skip_connection: False # Enable skip connection between transformer blocks - can solve problem with gradients and probably faster training

training:
  model_type: 'bs_roformer' 
  batch_size: 1
  gradient_accumulation_steps: 2 
  grad_clip: 0
  instruments: [
    'accordion',
    'acoustic-guitar',
    'back-vocal',
    'banjo',
    'bass',
    'bassoon',
    'bells',
    'bowed_strings',
    'brass',
    'cello',
    'clarinet',
    'congas',
    'digital-piano',
    'dobro',
    'double-bass',
    'drums',
    'electric-guitar',
    'flute',
    'french-horn',
    'glockenspiel',
    'guitar',
    'harmonica',
    'harp',
    'harpsichord',
    'hh',
    'keys',
    'kick',
    'lead-vocal',
    'mandolin',
    'marimba',
    'oboe',
    'organ',
    'percussion',
    'piano',
    'saxophone',
    'sitar',
    'snare',
    'strings',
    'synth',
    'tambourine',
    'timpani',
    'toms',
    'triangle',
    'trombone',
    'trumpet',
    'tuba',
    'ukulele',
    'viola',
    'violin',
    'vocal',
    'wind',
    'wind-chimes',
    'woodwind' 
  ]
  patience: 3
  reduce_factor: 0.95 
  target_instrument: null
  num_epochs: 240
  num_steps: 6000
  # precompute_chunks: True
  num_precompute_chunks: 100000 
  q: 0.95
  coarse_loss_clip: true  
  optimizer: prodigy 
  lr: 1.0
  # optimizer: adam
  # lr: 0.9e-5
  other_fix: false # it's needed for checking on multisong dataset if other is actually instrumental
  use_amp: true # enable or disable usage of mixed precision (float16) - usually it must be true

augmentations:
  enable: false # enable or disable all augmentations (to fast disable if needed)
  loudness: true # randomly change loudness of each stem on the range (loudness_min; loudness_max)
  loudness_min: 0.4
  loudness_max: 1.6
  mixup: true # mix several stems of same type with some probability (only works for dataset types: 1, 2, 3)
  mixup_probs: !!python/tuple # 2 additional stems of the same type (1st with prob 0.2, 2nd with prob 0.02)
    - 0.2
    - 0.02
    - 0.002
    - 0.0002
  mixup_loudness_min: 0.4
  mixup_loudness_max: 1.6

  all:
    channel_shuffle: 0.5 # Set 0 or lower to disable
    random_inverse: 0.01 # inverse track (better lower probability)
    random_polarity: 0.5 # polarity change (multiply waveform to -1)

loss_multistft:
  fft_sizes:
  - 1024
  - 2048
  - 4096
  hop_sizes:
  - 147
  - 256
  - 512
  win_lengths:
  - 1024
  - 2048
  - 4096
  window: "hann_window"
  scale: "mel"
  n_bins: 128
  sample_rate: 44100
  perceptual_weighting: false
  w_sc: 0.0
  w_log_mag: 1.0
  w_lin_mag: 0.0
  w_phs: 1.0
  mag_distance: "L1"


inference:
  chunk_size: 882000
  batch_size: 1
  dim_t: 1101
  num_overlap: 2
  normalize: false
